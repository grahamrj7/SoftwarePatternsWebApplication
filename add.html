<form method="post" action="/add">

<select class="form-select mb-3" name="title">
<option>T-Shirt</option>
<option>Hoodie</option>
<option>Shoes</option>
</select>

<select class="form-select mb-3" name="manufacturer">
<option>Nike</option>
<option>Adidas</option>
<option>Puma</option>
<option>Zara</option>
<option>H&M</option>
</select>

<input class="form-control mb-3" name="price" placeholder="Price"/>

<select class="form-select mb-3" name="category">
<option>Casual</option>
<option>Sportswear</option>
<option>Winter</option>
</select>

<select class="form-select mb-3" name="size">
<option>XXL</option>
<option>XL</option>
<option>L</option>
<option>M</option>
<option>S</option>
</select>

<input class="form-control mb-3" name="imageUrl" placeholder="Image URL"/>

<textarea class="form-control mb-3" name="description" placeholder="Description"></textarea>

<button class="btn btn-primary">Add</button>
</form>
