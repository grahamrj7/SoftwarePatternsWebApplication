<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Create Account</h2>

    <form method="post" action="/register">
        <input class="form-control mb-3" name="name" placeholder="Name">
        <input class="form-control mb-3" name="address" placeholder="Shipping Address">
        <input class="form-control mb-3" name="paymentMethod" placeholder="Payment Method">
        <button class="btn btn-primary">Register</button>
    </form>
</div>

</body>
</html>
